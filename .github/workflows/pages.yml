# Deploys the landing page to GitHub Pages.
# IMPORTANT: publishes ONLY the website/ folder — the docs/ strategy files
# (OPEN_SOURCE_PLAN, LAUNCH_AND_PROMO, …) are never exposed.
name: Deploy site

# Disabled until the repo is public (Phase 5). GitHub Pages on a private repo
# requires a paid plan, so the push trigger below is commented out to avoid
# failed runs. Restore the push trigger when flipping public.
on:
  # push:
  #   branches: [main]
  #   paths: ["website/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website
      - id: deployment
        uses: actions/deploy-pages@v4
