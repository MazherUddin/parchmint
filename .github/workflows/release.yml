# Builds signed/notarized macOS, Windows, and Linux installers and publishes a
# GitHub Release. Cutting a release is two commands on main:
#
#   npm version patch        # or minor/major — bumps package.json, Cargo.toml,
#                            # tauri.conf.json + locks in one commit, tags it
#   git push --follow-tags   # pushes commit + tag; the tag triggers this workflow
#
# Flow: create-release makes ONE draft (avoids the duplicate-draft race when
# platform jobs each try to create it), the build matrix uploads installers into
# it, and publish flips the draft live once ALL platforms succeed — so a failed
# build leaves an unpublished draft to inspect, never a half-shipped release.
# Release notes are auto-generated from merged PRs since the previous tag.
#
# The version guard fails the run immediately if the tag doesn't match
# tauri.conf.json — i.e. someone tagged without running `npm version`.
#
# macOS signing/notarization activates only when the APPLE_* secrets are present
# (see repo Settings -> Secrets). Without them the build still runs and ships an
# unsigned macOS app.
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches app version
        run: |
          APP_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$APP_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match tauri.conf.json version $APP_VERSION. Bump with 'npm version' before tagging."
            exit 1
          fi

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Parchmint ${tag}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true,
            });
            return data.id;

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (no-op until these secrets are set):
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish:
    needs: [create-release, build]
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
